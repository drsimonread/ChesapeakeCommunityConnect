<a class="signin-modal-trigger nav-link" data-target="signin-modal"> Sign In </a>

<div id="signin-modal" class="modal">
    {% csrf_token %}
    <div class="modal-background"></div>
    <div class="modal-card">
        <header class="modal-card-head">
            <p class="modal-card-title has-text-left">Sign In</p>
            <button type="button" class="delete" aria-label="close"></button>
        </header>
        <section class="modal-card-body">
            <div class="field">
                <div class="control">
                    <input class="input" type="text" name="username" id="signin_username" placeholder="Username">
                </div>
            </div>
            <div class="field">
                <div class="control">
                    <input class="input" type="password" name="password" id="signin_password" placeholder="Password">
                </div>
                <p class="help" id="signin_password_helper"></p>
            </div>

            <div class="control">
                <button class="button is-link is-fullwidth" type="submit" id="signin" disabled>Sign In</button>
            </div>

            <hr />
            <p class="has-text-centered mb-3">Or</p>
            
            <button id="google-signin-btn" class="button is-fullwidth is-outline" type="button" style="color: black;">
                <span class="icon">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="G">
                </span>
                <span>Sign In With Google</span>
            </button>
        </section>
        <footer class="modal-card-foot">
            <div class="control">
                <button type="button" class="button is-danger sign-in-up-cancel">Cancel</button>
            </div>
        </footer>
    </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>
    const signin_username = document.getElementById("signin_username");
    const signin_password = document.getElementById("signin_password");
    const signin_password_helper = document.getElementById("signin_password_helper");
    const signin_btn = document.getElementById("signin");

    // --- GOOGLE SIGN IN LOGIC ---
    window.onload = function () {
        google.accounts.id.initialize({
            client_id: "909497695712-h9smcju9klvlqk70celohtne9o438htn.apps.googleusercontent.com", // REPLACE THIS
            callback: handleGoogleResponse
        });
    };

    document.getElementById("google-signin-btn").onclick = () => {
        google.accounts.id.prompt(); // Shows the "One Tap" prompt or login popup
    };

    function handleGoogleResponse(response) {
        $.ajax({
            url: "/contribute/google-signin/", // You need to create this URL in Django
            type: "POST",
            data: {
                credential: response.credential,
                csrfmiddlewaretoken: $("input[name='csrfmiddlewaretoken']").val()
            },
            success: function(res) {
                if (res.success) {
                    location.reload();
                } else {
                    alert("Google Sign-In failed: " + (res.error || "Unknown error"));
                }
            }
        });
    }

    // --- MANUAL SIGN IN LOGIC ---
    $("#signin_password, #signin_username").on("input", function () {
        if ($("#signin_password").val() !== "" && $("#signin_username").val() !== "") {
            signin_btn.disabled = false;
        } else {
            signin_btn.disabled = true;
        }
        signin_password.classList.remove("is-danger");
        signin_password_helper.textContent = "";
    });

    $("#signin-modal").on("click", "#signin", function (e) {
        $.ajax({
            url: "/contribute/signin/",
            type: "POST",
            data: {
                username: $(signin_username).val(),
                password: $(signin_password).val(),
                csrfmiddlewaretoken: $("input[name='csrfmiddlewaretoken']").val()
            },
            success: function(response) {
                if (!response.is_password) {
                    signin_password.classList.add("is-danger");
                    signin_password_helper.classList.add("is-danger");
                    signin_password_helper.textContent = "Incorrect Password.";
                } else {
                    location.reload(true);
                }
            }
        });
    });

    // --- MODAL CONTROL LOGIC ---
    document.addEventListener('DOMContentLoaded', () => {
        function openModal($el) { $el.classList.add('is-active'); }
        function closeModal($el) {
            $el.classList.remove('is-active');
            signin_username.value = "";
            signin_password.value = "";
            signin_password.classList.remove("is-danger");
            signin_password_helper.textContent = "";
            signin_btn.disabled = true;
        }

        (document.querySelectorAll('.signin-modal-trigger') || []).forEach(($trigger) => {
            const $target = document.getElementById($trigger.dataset.target);
            $trigger.addEventListener('click', () => openModal($target));
        });

        (document.querySelectorAll('.modal-background, .delete, .sign-in-up-cancel') || []).forEach(($close) => {
            const $target = $close.closest('.modal');
            $close.addEventListener('click', () => closeModal($target));
        });

        document.addEventListener('keydown', (event) => {
            if(event.key === "Escape") {
                document.querySelectorAll('.modal').forEach(closeModal);
            }
        });
    });
</script>
