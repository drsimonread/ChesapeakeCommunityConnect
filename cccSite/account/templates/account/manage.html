{% extends "account/accountBase.html" %}
{% load static %}

{% block accountFunc %}

<link rel="stylesheet" href="{% static 'account/manage_account.css' %}">

<div id="content">

    <section class="manage-section" aria-labelledby="manage-title">
        <h2 id="manage-title" class="title is-3 has-text-centered mb-5">
            Manage Your Account
        </h2>

        <form 
            action="{% url 'account:manage' %}" 
            id="contact-form" 
            method="post" 
            enctype="multipart/form-data" 
            class="manage-form box"
            role="form"
        >
            {% csrf_token %}

            <!-- Name -->
            <div class="field">
                <label class="label" for="{{ form.name.id_for_label }}">Name</label>
                <div class="control">
                    {{ form.name|add_class:"input" }}
                </div>
            </div>

            <!-- Email -->
            <div class="field">
                <label class="label" for="{{ form.email.id_for_label }}">Email</label>
                <div class="control">
                    {{ form.email|add_class:"input" }}
                </div>
            </div>

            <!-- About -->
            <div class="field">
                <label class="label" for="{{ form.about.id_for_label }}">About</label>
                <div class="control">
                    {{ form.about|add_class:"textarea" }}
                </div>
            </div>

            <!-- Profile Picture -->
            <div class="field">
                <label class="label" for="{{ form.pic.id_for_label }}">Profile Picture</label>
                <div class="control">
                    {{ form.pic|add_class:"file-input" }}
                </div>
            </div>

            <!-- Submit -->
            <div class="field has-text-centered mt-4">
                <button class="button is-warning is-medium" type="submit">
                    Save Changes
                </button>
            </div>

        </form>
    </section>

</div>

{% endblock accountFunc %}
