{% extends "base/base.html" %}
{% load static %}

{% block content %}

<div class="account-shell">
    <div class="account-shell__inner">

        <div class="account-layout">

            <div class="account-main">

                <!-- 🔵 HERO SECTION -->
                <div class="contrib-hero">
                    <div class="contrib-hero__inner">

                        <div class="contrib-hero__mark">
                            📩
                        </div>

                        <div class="contrib-hero__text">
                            <span class="contrib-hero__kicker">CONTACT</span>

                            <h1 class="contrib-hero__title">
                                Contact Us
                            </h1>

                            <p class="contrib-hero__lede">
                                Send a message and we’ll get back when we can.
                            </p>
                        </div>

                    </div>
                </div>

                <!-- ⚪ FORM CARD -->
                <div class="account-main--surface">

                    <form action="{% url 'boiler:help' %}" method="post" class="account-form">
                        {% csrf_token %}

                        <div class="columns">

                            <!-- LEFT SIDE -->
                            <div class="column is-half">

                                <div class="account-form__field">
                                    <label>Name</label>
                                    {{ form.sender }}
                                </div>

                                <div class="account-form__field">
                                    <label>Email</label>
                                    {{ form.email }}
                                </div>

                                <div class="account-form__field">
                                    <label>Subject</label>
                                    {{ form.subject }}
                                </div>

                            </div>

                            <!-- RIGHT SIDE -->
                            <div class="column is-half">

                                <div class="account-form__field">
                                    <label>Message</label>
                                    {{ form.message }}
                                </div>

                            </div>

                        </div>

                        <!-- BUTTON -->
                        <div class="account-form__actions">
                            <button type="submit" class="account-btn account-btn--primary">
                                Submit Message
                            </button>
                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>
</div>

{% endblock %}
