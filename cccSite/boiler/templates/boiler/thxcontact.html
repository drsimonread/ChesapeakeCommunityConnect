{%extends "base/base.html"%}
{%load static%}
{%block head%}
<title>Chesapeake Community Connect - Contact</title>
{%endblock head%}
{% block content %}
<div class="site-shell site-font">
  <div class="site-shell__aurora" aria-hidden="true"></div>
  <div class="site-shell__pattern" aria-hidden="true"></div>
  <div class="site-shell__inner">
    <div class="site-main" role="main">
      <header class="site-page-header" aria-labelledby="thanks-title">
        <h1 id="thanks-title" class="site-page-header__title">Message received</h1>
        <p class="site-page-header__subtitle">Thanks for reaching out — we’ll get back to you when we can.</p>
      </header>
      <p class="site-centered-msg">Your message has been sent successfully.</p>
    </div>
  </div>
</div>
{% endblock content %}
